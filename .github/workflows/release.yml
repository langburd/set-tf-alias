---
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  gate:
    uses: ./.github/workflows/ci.yml

  release:
    needs: gate
    runs-on: ubuntu-latest
    env:
      REPO_URL: ${{ github.server_url }}/${{ github.repository }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: |
            install.sh
            set-tf-alias.sh

      - name: Compute sha256 of release tarball
        id: sha
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          url="${REPO_URL}/archive/refs/tags/${TAG}.tar.gz"
          for i in 1 2 3 4 5; do
            curl -fsSL "$url" -o /tmp/release.tar.gz && break
            [ "$i" -lt 5 ] || { echo "Failed to download tarball after 5 attempts"; exit 1; }
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          test -s /tmp/release.tar.gz
          sha256=$(sha256sum /tmp/release.tar.gz | cut -d' ' -f1)
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
          notes="$(gh release view "$TAG" --json body --jq '.body')"$'\n\nsha256: `'"${sha256}"'`'
          gh release edit "$TAG" --notes "$notes"

      - name: Open tap PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |-
          set -eu
          git clone "https://x-access-token:${GH_TOKEN}@github.com/langburd/homebrew-tap.git" tap
          cd tap
          git config user.name "set-tf-alias bot"
          git config user.email "set-tf-alias-bot@users.noreply.github.com"
          branch="bump-set-tf-alias-${TAG}"
          git checkout -b "$branch"

          url="${REPO_URL}/archive/refs/tags/${TAG}.tar.gz"
          sed -i.bak -E \
            -e "s|^(  url +\").*\"|\\1${url}\"|" \
            -e "s|^(  sha256 +\").*\"|\\1${SHA256}\"|" \
            Formula/set-tf-alias.rb
          rm -f Formula/set-tf-alias.rb.bak

          git add Formula/set-tf-alias.rb
          git commit -m "set-tf-alias: bump to ${TAG}"
          git push -u origin "$branch"

          gh pr create \
            --title "set-tf-alias: bump to ${TAG}" \
            --body "Automated bump for set-tf-alias ${TAG}.\nsha256: ${SHA256}" \
            --base main \
            --head "$branch"
