---
default_stages:
  - pre-commit
fail_fast: false
minimum_pre_commit_version: "2.15.0"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
      # Git hooks
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-vcs-permalinks
      - id: forbid-submodules
      - id: no-commit-to-branch
        args:
          - --branch
          - main
      # Common errors
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-yaml
      - id: destroyed-symlinks
      - id: end-of-file-fixer
        exclude: |
          (?x)^(
            CLAUDE\.md|
            \.claude/skills.*
          )$
      - id: fix-byte-order-marker
      - id: trailing-whitespace
        args:
          - "--markdown-linebreak-ext=md,markdown,mdown,mkd"
      # JSON
      - id: check-json
      # Cross platform
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: mixed-line-ending
        args:
          - --fix=lf
      # Security
      - id: detect-private-key
  # Conventional Commits — also run: pre-commit install -t commit-msg
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 91ab4bf57e58b32adf1a122681f6ebe164d081c8 # v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages:
          - commit-msg
        args:
          - --verbose
          - breaking change
          - build
          - chore
          - ci
          - docs
          - feat
          - feature
          - fix
          - major change
          - perf
          - refactor
          - revert
          - style
          - test
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 38980559e3a605691d6579f96222c30778e5a69e # 3.0.0
    hooks:
      - id: shellcheck
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: 05c1426671b9237fb5e1444dd63aa5731bec0dfb # v3.13.1-1
    hooks:
      - id: shfmt
        args:
          - "--indent"
          - "2"
  # Gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e # v8.30.1
    hooks:
      - id: gitleaks
  # YAML
  - repo: https://github.com/google/yamlfmt
    rev: 21ca5323a9c87ee37a434e0ca908efc0a89daa07 # v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/adrienverge/yamllint
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530 # v1.38.0
    hooks:
      - id: yamllint
        args:
          - -c=.yamllint.yml
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: e72a3ca1632f0b11a07d171449fe447a7ff6795e # v0.48.0
    hooks:
      - id: markdownlint-fix
        args:
          - "--disable"
          - "MD013"
